# ==========================================
# Configuración para Docker
# ==========================================

# Base de datos PostgreSQL (en contenedor)
spring.datasource.url=jdbc:postgresql://postgres:5432/ordenes_pago_db
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.root=INFO
logging.level.com.vortexbird.ordenesPago=INFO

# Storage local
storage.local.base-path=/app/uploads

# JWT
jwt.secret=${JWT_SECRET:your-super-secret-key-change-this-in-production-min-256-bits-long-key-for-jwt-tokens}
jwt.expiration=86400000

# Server
server.port=8080

# CORS (permitir frontend en Docker)
cors.allowed-origins=http://localhost,http://localhost:80,http://frontend,http://frontend:80

# Deshabilitar open-in-view warning
spring.jpa.open-in-view=false
