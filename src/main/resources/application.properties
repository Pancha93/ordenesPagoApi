# ===================================
# SERVER CONFIGURATION
# ===================================
server.port=8080
server.servlet.context-path=/
spring.application.name=ordenesPagoApi

# ===================================
# DATABASE CONFIGURATION (PostgreSQL)
# ===================================
spring.datasource.url=jdbc:postgresql://localhost:5432/payment_order_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.use_sql_comments=true

# SQL initialization
spring.sql.init.mode=never
#spring.jpa.defer-datasource-initialization=true

# ===================================
# SPRINGDOC / SWAGGER CONFIGURATION
# ===================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.show-actuator=false

# ===================================
# JWT CONFIGURATION
# ===================================
jwt.secret=your-super-secret-key-change-this-in-production-minimum-512-bits
jwt.expiration=3600000

# ===================================
# EXTERNAL API CONFIGURATION
# ===================================
external.api.base-url=https://dummyjson.com
external.api.notification-endpoint=/custom-response
external.api.timeout=5000

# ===================================
# STORAGE CONFIGURATION (Local para desarrollo)
# ===================================
storage.local.base-path=./uploads
storage.type=local

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================
# LOGGING
# ===================================
logging.level.root=INFO
logging.level.com.vortexbird.ordenesPago=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
