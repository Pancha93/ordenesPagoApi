# Test Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT
jwt.secret=test-secret-key-for-jwt-tokens-minimum-256-bits-long-for-testing-purposes-only
jwt.expiration=3600000

# External API (mock)
external.api.base-url=https://httpbin.org
external.api.notification-endpoint=/post
external.api.timeout=5000

# Logging
logging.level.com.vortexbird.ordenesPago=INFO
